<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>학습 보고서</title><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #eef0f5; color: #1a1a2e; -webkit-text-size-adjust: none; }
  .report-wrap { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; padding-bottom: 40px; }
  .header { background: linear-gradient(150deg, #0f2d55 0%, #1a4a8a 50%, #0f2d55 100%); padding: 36px 24px 30px; color: #fff; }
  .student-card { margin: 20px; padding: 20px; background: #f8fafc; border-radius: 18px; border: 1px solid #dde8f8; }
</style></head>
<body><div class="report-wrap">
<div class="header"><h2>3월 학습 보고서</h2></div>
<div class="student-card"><h3>🎯 이신우 학생</h3></div>
<div style="padding:20px; font-size:13px; line-height:1.6;">이번 달도 성실하게 학습하였습니다.</div>
</div></body></html>
