<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김세아 학습 보고서</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:20px 0;line-height:1.6}
.container{max-width:600px;margin:0 auto;background:white;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:30px 20px;text-align:center}
.header h1{font-size:24px;margin-bottom:10px;font-weight:700}
.header .period{font-size:14px;opacity:0.9;font-weight:300}
.section{padding:25px 20px;border-bottom:1px solid #f0f0f0}
.section:last-child{border-bottom:none}
.section-title{font-size:18px;font-weight:700;color:#333;margin-bottom:15px;display:flex;align-items:center}
.section-title::before{content:'';width:4px;height:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);margin-right:10px;border-radius:2px}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:15px}
.stat-card{background:#f8f9ff;border-radius:15px;padding:20px;text-align:center;border:2px solid #e8ebff}
.stat-value{font-size:32px;font-weight:700;color:#667eea;margin-bottom:5px}
.stat-label{font-size:13px;color:#666}
.chart-container{position:relative;height:250px;margin:20px 0}
.chart-container.tall{height:300px}
.subject-bar{margin:15px 0}
.subject-name{font-size:14px;color:#555;margin-bottom:8px;display:flex;justify-content:space-between}
.bar-bg{background:#f0f0f0;height:30px;border-radius:15px;overflow:hidden}
.bar-fill{height:100%;border-radius:15px;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:600}
.bar-fill.english{background:linear-gradient(90deg,#667eea 0%,#764ba2 100%)}
.bar-fill.math{background:linear-gradient(90deg,#f093fb 0%,#f5576c 100%)}
.bar-fill.korean{background:linear-gradient(90deg,#4facfe 0%,#00f2fe 100%)}
.bar-fill.etc{background:linear-gradient(90deg,#868e96 0%,#495057 100%)}
.test-card{background:white;border:2px solid #e8ebff;border-radius:12px;padding:15px;margin:12px 0}
.test-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.test-name{font-size:15px;font-weight:700;color:#333}
.test-count{font-size:12px;color:#666;background:#f0f0f0;padding:4px 10px;border-radius:12px}
.test-scores{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.test-score-item{text-align:center}
.test-score-label{font-size:11px;color:#999;margin-bottom:3px}
.test-score-value{font-size:18px;font-weight:700}
.test-score-value.avg{color:#667eea}.test-score-value.max{color:#4caf50}.test-score-value.min{color:#ff9800}
.score-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-left:8px}
.score-badge.excellent{background:#e8f5e9;color:#4caf50}
.score-badge.good{background:#e3f2fd;color:#2196f3}
.score-badge.normal{background:#fff3e0;color:#ff9800}
.score-badge.need-improve{background:#ffebee;color:#f44336}
.class-list{margin-top:15px}
.class-item{padding:12px 15px;background:white;border:2px solid #e8ebff;border-radius:10px;margin:8px 0;font-size:14px;color:#555}
.attendance-summary{display:flex;justify-content:space-around;margin-top:15px}
.attendance-item{text-align:center}
.attendance-value{font-size:24px;font-weight:700;margin-bottom:5px}
.attendance-value.present{color:#4caf50}.attendance-value.absent{color:#f44336}
.attendance-label{font-size:13px;color:#666}
.footer{padding:20px;text-align:center;background:#f8f9ff;color:#666;font-size:12px}
.highlight{background:#fff3cd;padding:15px;border-radius:10px;border-left:4px solid #ffc107;margin:15px 0;font-size:14px;color:#333;line-height:1.6}
.content-list{margin-top:15px}
.content-item{padding:12px;background:#f8f9ff;border-radius:8px;margin:8px 0;font-size:13px;color:#555}
.content-date{font-weight:700;color:#667eea;margin-right:8px}
.content-subject{display:inline-block;padding:2px 8px;background:#667eea;color:white;border-radius:4px;font-size:11px;margin-right:8px}
.math-header{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);color:white;padding:15px;border-radius:10px;margin-bottom:20px;text-align:center}
.math-header h3{font-size:18px;margin-bottom:5px}
.math-header p{font-size:13px;opacity:0.9}
.english-header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:15px;border-radius:10px;margin-bottom:20px;text-align:center}
.english-header h3{font-size:18px;margin-bottom:5px}
.english-header p{font-size:13px;opacity:0.9}
.score-timeline{margin:20px 0}
.timeline-item{display:flex;align-items:center;padding:12px;background:#f8f9ff;border-radius:8px;margin:8px 0;border-left:4px solid #f5576c}
.timeline-date{font-size:12px;color:#666;min-width:60px}
.timeline-type{display:inline-block;padding:3px 10px;background:#f5576c;color:white;border-radius:12px;font-size:11px;margin:0 10px;min-width:70px;text-align:center}
.timeline-score{font-size:16px;font-weight:700;color:#f5576c;margin-left:auto}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📚 김세아 학생 학습 보고서</h1>
    <div class="period">2026년 03월 · 아이톡학원</div>
  </div>

  <div class="section">
    <div class="section-title">📊 학습 요약</div>
    
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">0</div><div class="stat-label">총 수업 횟수</div></div>
      <div class="stat-card"><div class="stat-value">0.0%</div><div class="stat-label">출석률</div></div>
      <div class="stat-card"><div class="stat-value">0회</div><div class="stat-label">결석</div></div>
      <div class="stat-card"><div class="stat-value">미확인</div><div class="stat-label">학년</div></div>
    </div>
  </div>

  

  

  <div class="section">
    <div class="section-title">📖 과목별 수업 현황</div>
    
    
  </div>

  <div class="section">
    <div class="section-title">✅ 출결 현황</div>
    <div class="attendance-summary">
      <div class="attendance-item"><div class="attendance-value present">0회</div><div class="attendance-label">출석</div></div>
      <div class="attendance-item"><div class="attendance-value absent">0회</div><div class="attendance-label">결석</div></div>
    </div>
    <div style="margin-top:20px"><canvas id="attendanceChart"></canvas></div>
  </div>

  <div class="section">
    <div class="section-title">📝 최근 주요 수업 내용</div>
    <div class="content-list"><p style="color:#999;font-size:13px">수업 내용이 없습니다.</p></div>
  </div>

  

  <div class="section">
    <div class="section-title">💬 종합 평가</div>
    <div class="highlight">
      <p style="margin-bottom:10px"><strong>✨ 우수한 점</strong><br>• 성실하게 수업에 참여하고 있습니다</p>
      <p><strong>📌 개선 방향</strong><br>• 정기적인 수업 참여 필요</p>
    </div>
    <div style="background:#f8f9ff;padding:15px;border-radius:10px;border-left:4px solid #667eea;margin-top:15px;font-size:14px;color:#333;line-height:1.7">✏️ 3월 한 달간 수업 기록이 없습니다. 학습 진행을 위해 정기적인 수업 참여가 필요합니다. 상담을 통해 학습 계획을 재수립하시기 바랍니다.</div>
  </div>

  <div class="footer">아이톡학원 | 학습 보고서<br></div>
</div>

<script>

new Chart(document.getElementById('attendanceChart').getContext('2d'),{type:'bar',data:{labels:['출석','결석'],datasets:[{data:[0,0],backgroundColor:['rgba(76,175,80,0.8)','rgba(244,67,54,0.8)'],borderColor:['rgba(76,175,80,1)','rgba(244,67,54,1)'],borderWidth:2,borderRadius:8}]},options:{responsive:true,maintainAspectRatio:true,aspectRatio:2,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:5}}}}});


</script>
</body></html>
